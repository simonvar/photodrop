name: Build

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'jetbrains'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Decode release keystore
        run: echo "${{ secrets.RELEASE_KEYSTORE_BASE64 }}" | base64 --decode > "${{ github.workspace }}/release-keystore.jks"

      - name: Decode bundle keystore
        run: echo "${{ secrets.BUNDLE_KEYSTORE_BASE64 }}" | base64 --decode > "${{ github.workspace }}/bundle-keystore.jks"

      - name: Build debug APK
        run: ./gradlew assembleDebug

      - name: Build release APK
        env:
          KEYSTORE_FILE: ${{ github.workspace }}/release-keystore.jks
          KEYSTORE_PASSWORD: ${{ secrets.RELEASE_KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.RELEASE_KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.RELEASE_KEY_PASSWORD }}
        run: ./gradlew assembleRelease

      - name: Build release AAB
        env:
          KEYSTORE_FILE: ${{ github.workspace }}/bundle-keystore.jks
          KEYSTORE_PASSWORD: ${{ secrets.BUNDLE_KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.BUNDLE_KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.BUNDLE_KEY_PASSWORD }}
        run: ./gradlew bundleRelease

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: app/build/outputs/apk/debug/app-debug.apk

      - name: Upload release APK
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: app/build/outputs/apk/release/app-release.apk

      - name: Upload release AAB
        uses: actions/upload-artifact@v4
        with:
          name: app-release-bundle
          path: app/build/outputs/bundle/release/app-release.aab

      - name: Cleanup keystores
        if: always()
        run: rm -f "${{ github.workspace }}/release-keystore.jks" "${{ github.workspace }}/bundle-keystore.jks"
